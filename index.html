<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyza1</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
        }
        header {
            text-align: center;
            padding: 40px 20px;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        header p {
            color: #aaa;
        }
        nav {
            text-align: center;
            padding: 10px;
        }
        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #f39c12;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
        }
        .instagram {
            margin-top: 10px;
        }
        .instagram a {
            color: #f39c12;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <h1>yyza1 Productions</h1>
    <p>Photography Portfolio</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
</nav>

<section id="gallery" class="gallery">
    <!-- Replace these with your own images -->
    <img src="https://via.placeholder.com/500" alt="Photo 1">
    <img src="https://via.placeholder.com/500" alt="Photo 2">
    <img src="https://via.placeholder.com/500" alt="Photo 3">
    <img src="https://via.placeholder.com/500" alt="Photo 4">
</section>

<section id="contact" style="text-align:center; padding:40px;">
    <h2>Contact</h2>
    <p>DM me on Instagram</p>
    <div class="instagram">
        <a href="https://instagram.com/yourusername" target="_blank">
            instagram.com/yourusername
        </a>
    </div>
</section>

<footer>
    <p>© 2026 Your Name</p>
</footer>

</body>
</html>
